servers:
  - server_name: grafana.internal.example.com
    environment: internal
    listen: 443
    ssl: true
    ssl_certificate: /etc/ssl/certs/wildcard.internal.example.com.pem
    ssl_certificate_key: /etc/ssl/private/wildcard.internal.example.com.key
    upstream: grafana
    protection:
      ip_allowlist:
        - 10.0.0.0/8
    locations:
      - path: /
        proxy_pass: http://grafana:3000

  - server_name: prometheus.internal.example.com
    environment: internal
    listen: 443
    ssl: true
    ssl_certificate: /etc/ssl/certs/wildcard.internal.example.com.pem
    ssl_certificate_key: /etc/ssl/private/wildcard.internal.example.com.key
    upstream: prometheus
    locations:
      - path: /
        proxy_pass: http://prometheus:9090
      - path: /api/v1
        proxy_pass: http://prometheus:9090/api/v1

  - server_name: alertmanager.internal.example.com
    environment: internal
    listen: 443
    ssl: true
    ssl_certificate: /etc/ssl/certs/wildcard.internal.example.com.pem
    ssl_certificate_key: /etc/ssl/private/wildcard.internal.example.com.key
    upstream: alertmanager
    protection:
      basic_auth:
        realm: service
      ip_allowlist:
        - 10.0.0.0/8
    locations:
      - path: /
        proxy_pass: http://alertmanager:9093
